{% extends "base.html" %}
{% block content %}

<h2 class="mb-4 fw-bold">
    <i class="bi bi-person-workspace"></i> Admin Dashboard
</h2>

<div class="card shadow-lg p-4">

    <table class="table table-hover">
        <thead class="table-dark">
            <tr>
                <th>Employee</th>
                <th>Action</th>
            </tr>
        </thead>

        <tbody>
            {% for u in users %}
            <tr>
                <td class="fw-semibold">{{ u.name }}</td>
                <td>
                    <a href="/admin/user/{{ u.name }}" class="btn btn-primary btn-sm">
                        View
                    </a>
                </td>
            </tr>
            {% endfor %}
        </tbody>

    </table>

</div>

{% endblock %}
